<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="pracht — Full-stack Preact, per route.">
  <defs>
    <linearGradient id="prachtBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0418"/>
      <stop offset="1" stop-color="#1a0a38"/>
    </linearGradient>
    <linearGradient id="prachtMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="prachtGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#prachtBg)"/>
  <circle cx="130" cy="140" r="280" fill="url(#prachtGlow)"/>

  <!-- Standalone "p" mark: single path with evenodd counter + jewel inset -->
  <g transform="translate(58 78) scale(1.5)">
    <path fill="url(#prachtMark)" fill-rule="evenodd" d="M 15 13 L 37 13 A 24 24 0 1 1 37 61 L 37 87 L 15 87 Z M 51 37 A 10 10 0 1 0 71 37 A 10 10 0 1 0 51 37 Z"/>
    <circle cx="73" cy="25" r="3.5" fill="#fbbf24"/>
  </g>

  <!-- Wordmark (serif) -->
  <text x="228" y="152"
    font-family="Georgia, 'Times New Roman', 'Tiempos Text', serif"
    font-size="92" font-weight="700" letter-spacing="-2" fill="#ffffff">pracht</text>

  <!-- Gold rule echoes the jewel -->
  <line x1="230" y1="178" x2="290" y2="178" stroke="#fbbf24" stroke-width="2.5"/>

  <!-- Tagline -->
  <text x="230" y="213"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="22" font-weight="500" letter-spacing="-0.3" fill="#e9e3ff">Full-stack Preact, per route.</text>

  <!-- Mode metadata -->
  <text x="230" y="246"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="13" font-weight="500" letter-spacing="3" fill="#a78bfa">SSG  ·  SSR  ·  ISG  ·  SPA</text>
</svg>
